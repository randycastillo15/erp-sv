services:
  dte-gateway:
    build:
      context: ../../apps/dte-gateway
      dockerfile: Dockerfile
    container_name: dte-gateway
    ports:
      - "8100:8000"
    env_file:
      - ../../apps/dte-gateway/.env
    volumes:
      - ../../apps/dte-gateway/app:/app/app
      - ../../apps/dte-gateway/tests:/app/tests
      - dte_data:/app/data
    restart: unless-stopped

volumes:
  dte_data:
